<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NON — nonarkara.org</title>
  <meta name="description" content="A memory palace.">
  <meta property="og:title" content="NON — nonarkara.org">
  <meta property="og:description" content="A memory palace.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nonarkara.org">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Josefin+Sans:wght@300;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #f5f5f0;
      --amber: #f59e0b;
      --dim:   rgba(245, 245, 240, 0.35);
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--black); }
    body {
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      cursor: crosshair;
      -webkit-font-smoothing: antialiased;
    }

    canvas { display: block; }

    /* ── Overlay UI ── */
    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .brand {
      position: absolute;
      top: 28px;
      left: 32px;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 1.6s ease 1.2s;
    }
    .brand.in { opacity: 1; }

    .caption {
      position: absolute;
      top: 54px;
      left: 32px;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      transition: opacity 2s ease 2s;
    }
    .caption.in { opacity: 1; }

    .hint {
      position: absolute;
      bottom: 28px;
      left: 32px;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      transition: opacity 2.5s ease 2.5s;
    }
    .hint.in { opacity: 0.6; }

    .meta {
      position: absolute;
      bottom: 28px;
      right: 32px;
      display: flex;
      gap: 24px;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      transition: opacity 2.5s ease 2.5s;
      pointer-events: auto;
    }
    .meta.in { opacity: 0.6; }
    .meta a { color: inherit; text-decoration: none; }
    .meta a:hover { color: var(--white); }

    /* ── Tooltip on hover ── */
    .tip {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      padding: 8px 12px;
      border: 1px solid rgba(245, 245, 240, 0.4);
      background: rgba(0, 0, 0, 0.85);
      color: var(--white);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transform: translate(12px, 12px);
      transition: opacity 0.15s ease;
    }
    .tip.in { opacity: 1; }
    .tip .url {
      display: block;
      font-size: 8px;
      margin-top: 3px;
      letter-spacing: 0.1em;
      color: var(--dim);
      text-transform: lowercase;
    }

    /* Initial dark veil — fades out as scene appears */
    .veil {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 5;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    .veil.gone { opacity: 0; }

    /* ── Modal (CV / LinkedIn / Contact) ── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal.in { display: flex; }
    .modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: fadeBg 0.3s ease;
    }
    @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }

    .modal-card {
      position: relative;
      width: 100%;
      max-width: 480px;
      border: 1px solid rgba(245, 245, 240, 0.4);
      background: var(--black);
      padding: 56px 40px 40px;
      animation: rise 0.35s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid rgba(245, 245, 240, 0.3);
      color: var(--white);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-close:hover { border-color: var(--amber); color: var(--amber); }

    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
      text-align: center;
    }
    .modal-title {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.04em;
      text-align: center;
      margin-bottom: 28px;
    }
    .modal-qr {
      width: 256px;
      height: 256px;
      margin: 0 auto 24px;
      background: var(--white);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-qr canvas, .modal-qr img { width: 100%; height: 100%; image-rendering: pixelated; }
    .modal-cap {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      color: var(--dim);
      margin-bottom: 22px;
    }
    .modal-meta {
      font-size: 11px;
      line-height: 1.85;
      text-align: center;
      color: rgba(245, 245, 240, 0.7);
      letter-spacing: 0.05em;
    }
    .modal-meta a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(245, 245, 240, 0.25);
      transition: color 0.15s, border-color 0.15s;
    }
    .modal-meta a:hover { color: var(--amber); border-color: var(--amber); }
    .modal-meta .row { display: block; }

    /* Mobile constraints */
    @media (max-width: 600px) {
      .brand { font-size: 16px; top: 20px; left: 20px; }
      .caption { font-size: 8px; top: 44px; left: 20px; }
      .hint { font-size: 8px; bottom: 20px; left: 20px; letter-spacing: 0.18em; }
      .meta { right: 20px; bottom: 20px; gap: 14px; font-size: 8px; }
      .modal-card { padding: 48px 24px 32px; }
      .modal-qr { width: 220px; height: 220px; }
      .modal-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div id="canvas-root"></div>

  <div class="overlay">
    <div class="brand">NON</div>
    <div class="caption">memory palace</div>
    <div class="hint">click any screen or piece of furniture · move to look around</div>
    <div class="meta">
      <a href="mailto:nonsmartcity@gmail.com">contact</a>
      <a href="https://github.com/nonarkara" target="_blank" rel="noopener">github</a>
    </div>
  </div>

  <div class="tip" id="tip"></div>
  <div class="veil"></div>

  <!-- ── Modal ── -->
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-bg" data-close="1"></div>
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div class="modal-eyebrow" id="modal-eyebrow"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-qr" id="modal-qr"></div>
      <div class="modal-cap" id="modal-cap"></div>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    // ── Project metadata (TV grid: 5 cols × 4 rows = 20) ─────
    const PROJECTS = [
      { code: 'AXIOM',    title: 'Axiom Consultancy',                 url: 'https://axiom.nonarkara.org',                       img: 'screenshots/axiom.jpg' },
      { code: 'SLIC',     title: 'SLIC Index v3',                     url: 'https://slic.nonarkara.org',                        img: 'screenshots/slic.jpg' },
      { code: 'SCITI',    title: 'Smart City Thailand Index',         url: 'https://sciti.nonarkara.org',                       img: 'screenshots/sciti.jpg' },
      { code: 'TOMASITY', title: 'Muang Thong Thani',                 url: 'https://monitor.nonarkara.org',                     img: 'screenshots/monitor.jpg' },
      { code: 'CDP v2',   title: 'CD Data Platform',                  url: 'https://cdp.nonarkara.org',                         img: 'screenshots/cdp.jpg' },
      { code: 'TKC',      title: 'TKC Digital Twin · Showcase',       url: 'https://tkc.nonarkara.org',                         img: 'screenshots/tkc.jpg',     locked: true },
      { code: 'TKC OPS',  title: 'TKC · Command Center',              url: 'https://tkc-digital-twin.fly.dev/command-center',   img: 'screenshots/tkc-cc.jpg',  locked: true },
      { code: 'CONFLICT', title: 'Global Political Monitor',          url: 'https://conflict.nonarkara.org',                    img: 'screenshots/conflict.jpg' },
      { code: 'MEM',      title: 'Middle Eastern Monitor',            url: 'https://mem.nonarkara.org',                         img: 'screenshots/mem.jpg' },
      { code: 'GEO',      title: 'Thailand Geopolitical Watch',       url: 'https://geo.nonarkara.org',                         img: 'screenshots/geo.jpg' },
      { code: 'PHUKET',   title: 'Phuket Dashboard',                  url: 'https://phuket.nonarkara.org',                      img: 'screenshots/phuket.jpg' },
      { code: 'BUS',      title: 'Phuket Smart Bus',                  url: 'https://bus.nonarkara.org',                         img: 'screenshots/bus.jpg' },
      { code: 'KUCHING',  title: 'Greater Kuching IOC',               url: 'https://kuching.nonarkara.org',                     img: 'screenshots/kuching.jpg' },
      { code: 'SOLOMON',  title: 'Solomon Islands · UN DESA',         url: 'https://solomon.nonarkara.org',                     img: 'screenshots/solomon.jpg' },
      { code: 'ASCN',     title: 'ASEAN Smart Cities Network',        url: 'https://ascn.nonarkara.org',                        img: 'screenshots/ascn.jpg' },
      { code: 'NOVELS',   title: 'Substack · Novels',                 url: 'https://substack.com/@nonarkara',                   img: 'screenshots/substack.jpg' },
      { code: 'ESSAYS',   title: 'Medium · Essays',                   url: 'https://nonsmartcity.medium.com/',                  img: 'screenshots/medium.jpg' },
      { code: 'SOLITUDE', title: '100 Days of Solitude',              url: 'https://solitude.nonarkara.org',                    img: 'screenshots/solitude.jpg' },
      { code: 'YOUTUBE',  title: 'YouTube · @nonarkara',              url: 'https://www.youtube.com/@nonarkara',                img: 'screenshots/youtube.jpg' },
    ];

    // ── Furniture identities (modal payloads) ────────────────
    const VCARD = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:Arkara;Non;;Dr.;PhD',
      'FN:Dr. Non Arkara',
      'TITLE:Senior Expert in Smart City Promotion',
      'ORG:Digital Economy Promotion Agency',
      'EMAIL;type=WORK:non.ar@depa.or.th',
      'EMAIL;type=PERSONAL:nonsmartcity@gmail.com',
      'TEL;type=CELL:+66657095258',
      'TEL;type=WORK,VOICE:+6620262333',
      'URL:https://nonarkara.org',
      'URL:https://www.linkedin.com/in/drnon/',
      'ADR;type=WORK:;;234/431 Building A\\, Ladprao Lane.10\\, Lat Phrao Rd;Chom Phon\\, Chatuchak;Bangkok;10900;Thailand',
      'END:VCARD'
    ].join('\n');

    const FURNITURE = {
      bookshelf: {
        eyebrow: 'CV',
        title:   'Curriculum Vitae',
        qrData:  'https://nonarkara.org/cv.pdf',
        cap:     'scan to download · or tap to open',
        meta: `<a class="row" href="cv.pdf" target="_blank" rel="noopener">cv.pdf · 3 pages · march 2026</a>`
      },
      pedestal: {
        eyebrow: 'LINKEDIN',
        title:   'Professional Network',
        qrData:  'https://www.linkedin.com/in/drnon',
        cap:     'scan to view · or tap to open',
        meta: `<a class="row" href="https://www.linkedin.com/in/drnon" target="_blank" rel="noopener">linkedin.com/in/drnon</a>`
      },
      coffee: {
        eyebrow: 'CONTACT',
        title:   'Dr Non Arkara',
        qrData:  VCARD,
        cap:     'scan to add to your contacts',
        qrLevel: 'L',
        meta: `
          <span class="row">Senior Expert · Smart City Promotion</span>
          <span class="row">Digital Economy Promotion Agency</span>
          <span class="row">non.ar@depa.or.th · nonsmartcity@gmail.com</span>
          <span class="row">+66 65 709 5258 · +66 2 026 2333</span>
          <span class="row">234/431 Bldg A · Ladprao Lane 10 · Bangkok 10900</span>
        `
      }
    };

    // ── Scene basics ─────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 9, 32);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.7, 7.5);
    camera.lookAt(0, 2.6, -10);
    const baseRotX = camera.rotation.x;
    const baseRotY = camera.rotation.y;

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-root').appendChild(renderer.domElement);

    // ── Wireframe materials ──────────────────────────────────
    const matBright = new THREE.LineBasicMaterial({ color: 0xf5f5f0, transparent: true, opacity: 0 });
    const matDim    = new THREE.LineBasicMaterial({ color: 0xf5f5f0, transparent: true, opacity: 0 });
    const matFurni  = new THREE.LineBasicMaterial({ color: 0xf5f5f0, transparent: true, opacity: 0 });
    const matHover  = new THREE.LineBasicMaterial({ color: 0xf59e0b, transparent: true, opacity: 1 });
    const FADE_TARGETS = [
      { mat: matBright, target: 0.55 },
      { mat: matDim,    target: 0.18 },
      { mat: matFurni,  target: 0.50 },
    ];

    const wirebox = (w, h, d, mat = matFurni) =>
      new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)), mat);

    const placeAt = (obj, x, y, z) => { obj.position.set(x, y, z); return obj; };

    // ── Floor / ceiling / walls ──────────────────────────────
    {
      const grid = new THREE.GridHelper(120, 60, 0xf5f5f0, 0xf5f5f0);
      grid.material = matDim;
      scene.add(grid);
    }
    {
      const ceiling = new THREE.GridHelper(120, 30, 0xf5f5f0, 0xf5f5f0);
      ceiling.material = matDim;
      ceiling.position.y = 5.0;
      scene.add(ceiling);
    }
    [-9, 9].forEach(x => {
      const geom = new THREE.PlaneGeometry(60, 5, 30, 5);
      const wire = new THREE.LineSegments(new THREE.WireframeGeometry(geom), matDim);
      wire.position.set(x, 2.5, -10);
      wire.rotation.y = x > 0 ? -Math.PI / 2 : Math.PI / 2;
      scene.add(wire);
    });

    // ── Reusable: build a clickable furniture group ──────────
    const INTERACTABLES = [];

    function makeClickableGroup(key, hitW, hitH, hitD, x, y, z) {
      const group = new THREE.Group();
      group.position.set(x, y, z);
      const lines = []; // wireframe child meshes whose material we toggle on hover
      const hit = new THREE.Mesh(
        new THREE.BoxGeometry(hitW, hitH, hitD),
        new THREE.MeshBasicMaterial({ visible: false })
      );
      group.add(hit);
      group.userData = {
        kind: 'furniture',
        key,
        lines,
        hit,
        baseMaterial: matFurni,
      };
      scene.add(group);
      INTERACTABLES.push(group);
      return { group, lines };
    }

    // ── Furniture: coffee table → CONTACT ────────────────────
    {
      const { group, lines } = makeClickableGroup('coffee', 2.4, 0.7, 1.2, 0, 0.4, 1.5);
      // table top
      const top = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(2.0, 0.05, 1.0)), matFurni);
      top.position.set(0, 0.02, 0); group.add(top); lines.push(top);
      // legs
      [-0.9, 0.9].forEach(dx => [-0.4, 0.4].forEach(dz => {
        const leg = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(0.04, 0.4, 0.04)), matFurni);
        leg.position.set(dx, -0.21, dz);
        group.add(leg); lines.push(leg);
      }));
      // coffee cup
      const cyl = new THREE.CylinderGeometry(0.06, 0.06, 0.12, 12);
      const cup = new THREE.LineSegments(new THREE.WireframeGeometry(cyl), matFurni);
      cup.position.set(0.4, 0.11, 0); group.add(cup); lines.push(cup);
    }

    // ── Furniture: chair (decoration only — not clickable) ───
    {
      const x0 = -3.5, z0 = 1.7;
      scene.add(placeAt(wirebox(0.55, 0.05, 0.55), x0, 0.5, z0));
      scene.add(placeAt(wirebox(0.55, 0.7, 0.05),  x0, 0.85, z0 + 0.25));
      [-0.22, 0.22].forEach(dx => [-0.22, 0.22].forEach(dz => {
        scene.add(placeAt(wirebox(0.04, 0.5, 0.04), x0 + dx, 0.25, z0 + dz));
      }));
    }

    // ── Furniture: pedestal + globe → LINKEDIN ───────────────
    {
      const { group, lines } = makeClickableGroup('pedestal', 0.9, 2.5, 0.9, 3.4, 1.0, -2);
      // pedestal box
      const box = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(0.4, 1.5, 0.4)), matFurni);
      box.position.set(0, -0.25, 0); group.add(box); lines.push(box);
      // wireframe sphere
      const sph = new THREE.LineSegments(
        new THREE.WireframeGeometry(new THREE.SphereGeometry(0.32, 18, 12)), matFurni);
      sph.position.set(0, 0.82, 0); group.add(sph); lines.push(sph);
    }

    // ── Furniture: bookshelf → CV ────────────────────────────
    {
      const { group, lines } = makeClickableGroup('bookshelf', 0.8, 3.4, 1.8, -6.5, 1.6, -2.2);
      const shell = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(0.45, 3.2, 1.6)), matFurni);
      group.add(shell); lines.push(shell);
      for (let i = 1; i < 5; i++) {
        const sh = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(0.43, 0.02, 1.55)), matFurni);
        sh.position.y = i * 0.6 - 1.5;
        group.add(sh); lines.push(sh);
      }
      for (let i = 0; i < 4; i++) {
        const w = 0.12 + Math.random() * 0.06;
        const h = 0.32 + Math.random() * 0.06;
        const book = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, 0.18)), matFurni);
        book.position.set(0.05, -0.7, -0.5 + i * 0.18);
        group.add(book); lines.push(book);
      }
    }

    // ── Lamp (decoration) ────────────────────────────────────
    {
      const x0 = 5.5, z0 = 0.5;
      const poleG = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x0, 0, z0), new THREE.Vector3(x0, 2.4, z0)
      ]);
      scene.add(new THREE.Line(poleG, matFurni));
      const cone = new THREE.ConeGeometry(0.3, 0.35, 12, 1, true);
      const wire = new THREE.LineSegments(new THREE.WireframeGeometry(cone), matFurni);
      wire.position.set(x0, 2.55, z0);
      scene.add(wire);
    }

    // ── TVs at far wall (5 × 4 grid = 20) ────────────────────
    const TV_W = 1.22, TV_H = 0.77;
    const GAP_X = 0.18, GAP_Y = 0.24;
    const COLS = 5;
    const tvLoader = new THREE.TextureLoader();

    const ROWS = Math.ceil(PROJECTS.length / COLS);
    PROJECTS.forEach((p, i) => {
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const cx = (col - (COLS - 1) / 2) * (TV_W + GAP_X);
      // center the grid vertically around y = 2.55 (slightly above eye level)
      const cy = 2.55 + ((ROWS - 1) / 2 - row) * (TV_H + GAP_Y);
      const cz = -10;

      const grp = new THREE.Group();
      grp.position.set(cx, cy, cz);

      const frame = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(TV_W, TV_H, 0.06)),
        matBright
      );
      grp.add(frame);

      const tex = tvLoader.load(p.img, (t) => { t.colorSpace = THREE.SRGBColorSpace; });
      const screenMat = new THREE.MeshBasicMaterial({
        map: tex, transparent: true, opacity: 0,
        side: THREE.FrontSide, depthWrite: false
      });
      const screen = new THREE.Mesh(new THREE.PlaneGeometry(TV_W * 0.94, TV_H * 0.88), screenMat);
      screen.position.z = 0.04;
      grp.add(screen);

      const hit = new THREE.Mesh(
        new THREE.BoxGeometry(TV_W, TV_H, 0.08),
        new THREE.MeshBasicMaterial({ visible: false })
      );
      grp.add(hit);

      grp.userData = {
        kind: 'tv',
        project: p,
        frame,
        screen,
        hit,
        screenTargetOpacity: 0.45,
        baseMaterial: matBright,
      };
      scene.add(grp);
      INTERACTABLES.push(grp);
    });

    // ── Mouse / touch handling ───────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const target = { x: 0, y: 0 };
    let hovered = null;

    function onPointerMove(e) {
      const x = (e.touches ? e.touches[0].clientX : e.clientX);
      const y = (e.touches ? e.touches[0].clientY : e.clientY);
      mouse.x = (x / window.innerWidth) * 2 - 1;
      mouse.y = -(y / window.innerHeight) * 2 + 1;
      target.y = -mouse.x * 0.06;
      target.x =  mouse.y * 0.04;
      const tip = document.getElementById('tip');
      if (hovered) { tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
    }
    window.addEventListener('mousemove', onPointerMove, { passive: true });
    window.addEventListener('touchmove', onPointerMove, { passive: true });

    function onClick(e) {
      // Don't intercept if a modal is open
      if (document.getElementById('modal').classList.contains('in')) return;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(INTERACTABLES.map(o => o.userData.hit));
      if (!hits.length) return;
      const grp = hits[0].object.parent;
      const ud = grp.userData;
      if (ud.kind === 'tv') {
        if (ud.project?.url) window.open(ud.project.url, '_blank', 'noopener');
      } else if (ud.kind === 'furniture') {
        openModal(ud.key);
      }
    }
    window.addEventListener('click', onClick);
    window.addEventListener('touchend', onClick);

    // ── Modal logic ──────────────────────────────────────────
    function buildQR(data, level = 'M') {
      const qr = window.qrcode(0, level);
      qr.addData(data);
      qr.make();
      return qr.createDataURL(8, 0);
    }

    const modal = document.getElementById('modal');
    function openModal(key) {
      const cfg = FURNITURE[key];
      if (!cfg) return;
      document.getElementById('modal-eyebrow').textContent = cfg.eyebrow;
      document.getElementById('modal-title').textContent   = cfg.title;
      document.getElementById('modal-cap').textContent     = cfg.cap;
      document.getElementById('modal-meta').innerHTML      = cfg.meta;
      // Build QR
      const qrUrl = buildQR(cfg.qrData, cfg.qrLevel || 'M');
      document.getElementById('modal-qr').innerHTML = `<img src="${qrUrl}" alt="QR code">`;
      modal.classList.add('in');
    }
    function closeModal() { modal.classList.remove('in'); }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target.dataset.close === '1') closeModal();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ── Resize ───────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Reveal ───────────────────────────────────────────────
    const startTime = performance.now();
    document.querySelector('.veil').classList.add('gone');
    setTimeout(() => {
      document.querySelector('.brand').classList.add('in');
      document.querySelector('.caption').classList.add('in');
      document.querySelector('.hint').classList.add('in');
      document.querySelector('.meta').classList.add('in');
    }, 200);

    // ── Render loop ──────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      const t = (performance.now() - startTime) / 1000;

      const fadeT = Math.min(t / 3.5, 1);
      const ease = 1 - Math.pow(1 - fadeT, 3);
      FADE_TARGETS.forEach(({ mat, target }) => mat.opacity = target * ease);

      // Hover detection
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(INTERACTABLES.map(o => o.userData.hit));
      const hit = hits[0]?.object?.parent || null;

      if (hit !== hovered) {
        // Restore previous
        if (hovered) {
          const ud = hovered.userData;
          if (ud.kind === 'tv') {
            ud.frame.material = matBright;
            ud.screenTargetOpacity = 0.45;
          } else if (ud.kind === 'furniture') {
            ud.lines.forEach(l => l.material = ud.baseMaterial);
          }
        }
        hovered = hit;
        const tip = document.getElementById('tip');
        if (hovered) {
          const ud = hovered.userData;
          if (ud.kind === 'tv') {
            ud.frame.material = matHover;
            ud.screenTargetOpacity = 0.85;
            const lockHint = ud.project.locked ? `<span class="url">🔒 password: 696969</span>` : '';
            tip.innerHTML = `${ud.project.code}<span class="url">${ud.project.title.toLowerCase()}</span>${lockHint}`;
          } else if (ud.kind === 'furniture') {
            ud.lines.forEach(l => l.material = matHover);
            const cfg = FURNITURE[ud.key];
            tip.innerHTML = `${cfg.eyebrow}<span class="url">${cfg.title.toLowerCase()}</span>`;
          }
          tip.classList.add('in');
          document.body.style.cursor = 'pointer';
        } else {
          tip.classList.remove('in');
          document.body.style.cursor = 'crosshair';
        }
      }

      // Smooth screen opacity (TVs only)
      INTERACTABLES.forEach(grp => {
        if (grp.userData.kind === 'tv') {
          const m = grp.userData.screen.material;
          const tgt = grp.userData.screenTargetOpacity * ease;
          m.opacity += (tgt - m.opacity) * 0.12;
        }
      });

      // Camera parallax
      camera.rotation.y += (target.y + baseRotY - camera.rotation.y) * 0.04;
      camera.rotation.x += (target.x + baseRotX - camera.rotation.x) * 0.04;
      camera.position.y = 1.7 + Math.sin(t * 0.4) * 0.015;

      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>
</html>
