name = "nonarkara-status"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "74ad6bf8dfaaccf82de6f0847f7d2d54"

# Cron — ping every 5 minutes, store latest in KV
[triggers]
crons = ["*/5 * * * *"]

# KV binding — the namespace ID is filled in after `wrangler kv namespace create STATUS`
[[kv_namespaces]]
binding = "STATUS"
id = "REPLACE_WITH_KV_ID"

# Custom domain — api.nonarkara.org
[[routes]]
pattern = "api.nonarkara.org/*"
zone_name = "nonarkara.org"

[observability]
enabled = true
